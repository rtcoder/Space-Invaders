<!DOCTYPE html>
<html>
    <head>
        <title>Invaders</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div id="game">
            <div id="info">
                <span>
                    <span>Level:&nbsp;</span>
                    <span id="level"></span>
                </span>
                <span>|
                    <span>lives:&nbsp;</span>
                    <span id="lives"></span>
                </span>
                <span>|
                    <span>score:&nbsp;</span>
                    <span id="score"></span>
                </span>
                <span id="doubleShootContainer">|
                    <span>double shoot:&nbsp;</span>
                    <span id="doubleShoot"></span>
                </span>
                <span id="largeShipContainer">|
                    <span>large ship:&nbsp;</span>
                    <span id="largeShip"></span>
                </span>
                <span id="superSpeedContainer">|
                    <span>super speed:&nbsp;</span>
                    <span id="superSpeed"></span>
                </span>
                <span class="right">
                    Designed & programmed by <a href="https://github.com/rtcoder">rtCoder</a>
                </span>
            </div>

            <canvas id="canvas"></canvas>

            <div id="message" class="hidden">
                <h1 id="messageTitle"></h1>
                <p id="messageText"></p>
                <button id="messageAction">Continue</button>
            </div>

            <div id="menu">
                <ul>
                    <li id="startGame">Play</li>
                    <li class="open-view" data-id="controls">Controls</li>
                    <li class="open-view" data-id="equipment">Equipment</li>
                    <li class="open-view" data-id="credits">Credits</li>
                </ul>
            </div>

            <div class="view" id="controls">
                <button class="back"><-</button>
                <h2>Controls</h2>
                <ul class="options">
                    <li><button class="control-option" data-control="mouse">Mouse</button></li>
                    <li><button class="control-option" data-control="keyboard">Keyboard</button></li>
                    <li><button class="control-option" data-control="both">Mouse + Keyboard</button></li>
                </ul>
            </div>
            <div class="view" id="equipment">
                <button class="back"><-</button>
                <h2>Equipment</h2>
                <ul class="equipment-list">
                    <li><span class="power double">D</span> double shoot</li>
                    <li><span class="power large">L</span> large ship</li>
                    <li><span class="power speed">S</span> super speed</li>
                    <li><span class="power bomb">B</span> bomb</li>
                </ul>
            </div>
            <div class="view" id="credits">
                <button class="back"><-</button>
                <h2>Credits</h2>
                <p>Designed & programmed by rtCoder</p>
            </div>
        </div>
        <script>
            var canvas = document.getElementById("canvas");
            var ctx = canvas.getContext('2d');
        </script>
        <script src="js/levels.js"></script>
        <script src="js/custom.js"></script>
        <script src="js/Controls.class.js"></script>
        <script src="js/Mouse.class.js"></script>
        <script src="js/Keys.class.js"></script>
        <script src="js/Extras.class.js"></script>
        <script src="js/Package.class.js"></script>
        <script src="js/Enemies.class.js"></script>
        <script src="js/Collisions.class.js"></script>
        <script src="js/Draw.class.js"></script>
        <script src="js/Missiles.class.js"></script>
        <script src="js/Player.class.js"></script>
        <script src="js/Invaders.class.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
