<!DOCTYPE html>
<html>
    <head>
        <title>Retro Invaders</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div id="game">
            <div id="info" class="hud">
                <div class="hud-cluster hud-primary">
                    <div class="hud-tile">
                        <span class="hud-label">Wave</span>
                        <span class="hud-value" id="level"></span>
                    </div>
                    <div class="hud-tile">
                        <span class="hud-label">Lives</span>
                        <span class="hud-value" id="lives"></span>
                    </div>
                </div>
                <div class="hud-score">
                    <span class="hud-label">Score</span>
                    <span class="hud-value" id="score"></span>
                </div>
                <div class="hud-cluster hud-secondary">
                    <span class="hud-power" id="doubleShootContainer">
                        <span class="hud-power-icon double">D</span>
                        <span class="hud-power-name">Double</span>
                        <span id="doubleShoot"></span>
                    </span>
                    <span class="hud-power" id="largeShipContainer">
                        <span class="hud-power-icon large">L</span>
                        <span class="hud-power-name">Large</span>
                        <span id="largeShip"></span>
                    </span>
                    <span class="hud-power" id="superSpeedContainer">
                        <span class="hud-power-icon speed">S</span>
                        <span class="hud-power-name">Speed</span>
                        <span id="superSpeed"></span>
                    </span>
                    <span class="hud-power" id="bombWeaponContainer">
                        <span class="hud-power-icon bomb">B</span>
                        <span class="hud-power-name">Bomb</span>
                        <span id="bombWeapon"></span>
                    </span>
                    <span class="hud-power" id="laserWeaponContainer">
                        <span class="hud-power-icon laser">L</span>
                        <span class="hud-power-name">Laser</span>
                        <span id="laserWeapon"></span>
                    </span>
                    <span class="hud-power" id="spreadWeaponContainer">
                        <span class="hud-power-icon spread">S</span>
                        <span class="hud-power-name">Spread</span>
                        <span id="spreadWeapon"></span>
                    </span>
                    <span class="hud-power" id="rocketWeaponContainer">
                        <span class="hud-power-icon rocket">R</span>
                        <span class="hud-power-name">Rocket</span>
                        <span id="rocketWeapon"></span>
                    </span>
                    <span class="hud-power" id="pierceWeaponContainer">
                        <span class="hud-power-icon pierce">P</span>
                        <span class="hud-power-name">Pierce</span>
                        <span id="pierceWeapon"></span>
                    </span>
                    <span class="hud-power" id="rapidWeaponContainer">
                        <span class="hud-power-icon rapid">F</span>
                        <span class="hud-power-name">Rapid</span>
                        <span id="rapidWeapon"></span>
                    </span>
                    <span class="hud-power" id="shieldWeaponContainer">
                        <span class="hud-power-icon shield">H</span>
                        <span class="hud-power-name">Shield</span>
                        <span id="shieldWeapon"></span>
                    </span>
                    <span class="hud-credit">
                        by <a href="https://github.com/rtcoder">rtCoder</a>
                    </span>
                </div>
            </div>

            <canvas id="canvas"></canvas>

            <div id="message" class="hidden">
                <h1 id="messageTitle"></h1>
                <p id="messageText"></p>
                <button id="messageAction">Continue</button>
            </div>

            <div id="menu">
                <div class="menu-shell">
                    <p class="menu-kicker">Arcade defense protocol</p>
                    <h1>Retro Invaders</h1>
                    <div class="menu-actions">
                        <button id="startGame" class="menu-action primary">Play</button>
                        <button class="menu-action open-view" data-id="controls">Controls</button>
                    </div>
                    <p class="menu-footer">Wave clear / score chase / power-up rush</p>
                </div>
            </div>

            <div class="view" id="controls">
                <button class="back">Back</button>
                <div class="controls-panel">
                    <p class="menu-kicker">Input deck</p>
                    <h2>Controls</h2>
                    <div class="control-grid">
                        <button class="control-option" data-control="mouse">
                            <span class="control-title">Pointer</span>
                            <span class="control-detail">Mouse or touch move / hold fire</span>
                        </button>
                        <button class="control-option" data-control="keyboard">
                            <span class="control-title">Keyboard</span>
                            <span class="control-detail">Arrows move / Space fire</span>
                        </button>
                        <button class="control-option" data-control="both">
                            <span class="control-title">Hybrid</span>
                            <span class="control-detail">Mouse and keyboard active together</span>
                        </button>
                    </div>
                    <div class="key-map">
                        <span><b>Esc</b> pause</span>
                        <span><b>Space</b> fire</span>
                        <span><b>Touch</b> hold fire</span>
                        <span><b>Arrows</b> move</span>
                        <span><b>Weapons</b> replace fire</span>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="js/script.js"></script>
    </body>
</html>
