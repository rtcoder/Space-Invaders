<!DOCTYPE html>
<html>
    <head>
        <title>Retro Invaders</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div id="game">
            <div id="info" class="hud">
                <div class="hud-cluster hud-primary">
                    <div class="hud-tile">
                        <span class="hud-label">Wave</span>
                        <span class="hud-value" id="level"></span>
                    </div>
                    <div class="hud-tile">
                        <span class="hud-label">Lives</span>
                        <span class="hud-value" id="lives"></span>
                    </div>
                </div>
                <div class="hud-score">
                    <span class="hud-label">Score</span>
                    <span class="hud-value" id="score"></span>
                </div>
                <div class="hud-cluster hud-secondary">
                    <span class="hud-power" id="doubleShootContainer">
                        <span class="hud-power-icon double">D</span>
                        <span class="hud-power-name">Double</span>
                        <span id="doubleShoot"></span>
                    </span>
                    <span class="hud-power" id="largeShipContainer">
                        <span class="hud-power-icon large">L</span>
                        <span class="hud-power-name">Large</span>
                        <span id="largeShip"></span>
                    </span>
                    <span class="hud-power" id="superSpeedContainer">
                        <span class="hud-power-icon speed">S</span>
                        <span class="hud-power-name">Speed</span>
                        <span id="superSpeed"></span>
                    </span>
                    <span class="hud-credit">
                        by <a href="https://github.com/rtcoder">rtCoder</a>
                    </span>
                </div>
            </div>

            <canvas id="canvas"></canvas>

            <div id="message" class="hidden">
                <h1 id="messageTitle"></h1>
                <p id="messageText"></p>
                <button id="messageAction">Continue</button>
            </div>

            <div id="menu">
                <div class="menu-shell">
                    <p class="menu-kicker">Arcade defense protocol</p>
                    <h1>Retro Invaders</h1>
                    <div class="menu-actions">
                        <button id="startGame" class="menu-action primary">Play</button>
                        <button class="menu-action open-view" data-id="controls">Controls</button>
                    </div>
                    <p class="menu-footer">Wave clear / score chase / power-up rush</p>
                </div>
            </div>

            <div class="view" id="controls">
                <button class="back">Back</button>
                <div class="controls-panel">
                    <p class="menu-kicker">Input deck</p>
                    <h2>Controls</h2>
                    <div class="control-grid">
                        <button class="control-option" data-control="mouse">
                            <span class="control-title">Mouse</span>
                            <span class="control-detail">Move aim / left fire / right bomb</span>
                        </button>
                        <button class="control-option" data-control="keyboard">
                            <span class="control-title">Keyboard</span>
                            <span class="control-detail">Arrows move / Space fire / Z bomb</span>
                        </button>
                        <button class="control-option" data-control="both">
                            <span class="control-title">Hybrid</span>
                            <span class="control-detail">Mouse and keyboard active together</span>
                        </button>
                    </div>
                    <div class="key-map">
                        <span><b>Esc</b> pause</span>
                        <span><b>Space</b> fire</span>
                        <span><b>Z</b> bomb</span>
                        <span><b>Arrows</b> move</span>
                    </div>
                </div>
            </div>
        </div>
        <script>
            var canvas = document.getElementById("canvas");
            var ctx = canvas.getContext('2d');
        </script>
        <script src="js/levels.js"></script>
        <script src="js/custom.js"></script>
        <script src="js/Controls.class.js"></script>
        <script src="js/Mouse.class.js"></script>
        <script src="js/Keys.class.js"></script>
        <script src="js/Extras.class.js"></script>
        <script src="js/Package.class.js"></script>
        <script src="js/Enemies.class.js"></script>
        <script src="js/Collisions.class.js"></script>
        <script src="js/Draw.class.js"></script>
        <script src="js/Missiles.class.js"></script>
        <script src="js/Player.class.js"></script>
        <script src="js/Invaders.class.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
